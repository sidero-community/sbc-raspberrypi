# References:
#   U-Boot:
#     - https://u-boot.readthedocs.io/en/latest
#   Broadcom/RaspberryPi
#     - https://github.com/u-boot/u-boot/blob/master/doc/board/broadcom/raspberrypi.rst
name: u-boot
variant: scratch
shell: /bin/bash
dependencies:
  - stage: base
steps:
  - sources:
      - url: https://ftp.denx.de/pub/u-boot/u-boot-{{ .uboot_version }}.tar.bz2
        destination: u-boot.tar.bz2
        sha256: "{{ .uboot_sha256 }}"
        sha512: "{{ .uboot_sha512 }}"
    env:
      SOURCE_DATE_EPOCH: {{ .BUILD_ARG_SOURCE_DATE_EPOCH }}
    prepare:
      - |
        tar xf u-boot.tar.bz2 --strip-components=1
      - |
        patch -p1 < /pkg/patches/0002-arm-bcm283x-add-BCM2712-SoC-support.patch
        patch -p1 < /pkg/patches/0003-arm-dts-add-bcm2712-rpi-5-b-support.patch
        patch -p1 < /pkg/patches/0004-pci-brcmstb-add-BCM2712-PCIe-controller-support.patch
        patch -p1 < /pkg/patches/0005-pci-uclass-fix-ofnode-matching-for-RP1.patch
        patch -p1 < /pkg/patches/0006-reset-add-Broadcom-brcmstb-reset-drivers.patch
        patch -p1 < /pkg/patches/0007-mfd-add-RP1-multi-function-device-driver.patch
        patch -p1 < /pkg/patches/0008-clk-add-RP1-clock-driver.patch
        patch -p1 < /pkg/patches/0009-gpio-add-RP1-GPIO-driver.patch
        patch -p1 < /pkg/patches/0010-pinctrl-add-BCM2712-pinctrl-driver.patch
        patch -p1 < /pkg/patches/0011-net-macb-add-RP1-ethernet-support.patch
        patch -p1 < /pkg/patches/0012-nvme-use-virt-to-bus-address-translation.patch
        patch -p1 < /pkg/patches/0013-core-fix-DMA-range-and-PCI-devfn-handling.patch
        patch -p1 < /pkg/patches/0014-rpi-board-add-RP1-init-and-boot-config.patch
        patch -p1 < /pkg/patches/0015-rpi-defconfig-enable-BCM2712-and-EFI-boot.patch

        make rpi_arm64_defconfig
    build:
      # rpi_generic
      - |
        make -j $(nproc) HOSTLDLIBS_mkimage="-lssl -lcrypto"
    install:
      # rpi_generic
      - |
        mkdir -p /rootfs/artifacts/arm64/u-boot/rpi_generic
        cp -v u-boot.bin /rootfs/artifacts/arm64/u-boot/rpi_generic
finalize:
  - from: /rootfs
    to: /rootfs
